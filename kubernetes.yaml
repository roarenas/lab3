apiVersion: v1
kind: Namespace
metadata: 
  name: curso-contenedores
  labels:
    app: curso-contenedores
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: curso-contenedores-config
data:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: curso_contenedores
  ENABLE_DB: "true"
  APP_VERSION: 1.0.0
---
apiVersion: v1
kind: Secret
metadata:
  name: curso-contenedores-secret
type: Opaque
stringData:
  POSTGRES_PASSWORD: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curso-contenedores
  namespace: curso-contenedores
  labels:
    app: curso-contenedores
spec:
  replicas: 3
  selector:
    matchLabels:
      app: curso-contenedores
  template:
    metadata:
      labels:
         app: curso-contenedores
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: curso-contenedores
          image: ghcr.io/carlosmarind/curso-contenedores:latest

          imagePullPolicy: Always
          env:
            - name: DB_HOST
              value: curso-contenedores-postgres.curso-contenedores
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: curso-contenedores-config
                  key: POSTGRES_USER
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: curso-contenedores-config
                  key: POSTGRES_DB
            - name: ENABLE_DB
              valueFrom:
                configMapKeyRef:
                  name: curso-contenedores-config
                  key: ENABLE_DB
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: curso-contenedores-config
                  key: APP_VERSION
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: curso-contenedores-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: curso-contenedores
  namespace: curso-contenedores
  labels:
    app: curso-contenedores
spec:
  type: ClusterIP
  selector:
    app: curso-contenedores
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: curso-contenedores
  namespace: curso-contenedores
  labels:
    app.kubernetes.io/name: curso-contenedores
    app: curso-contenedores
spec:
  ingressClassName: nginx
  rules:
  - host: app.local
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: curso-contenedores
            port:
              number: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curso-contenedores-postgres
  namespace: curso-contenedores
  labels:
    app: curso-contenedores-postgres
    app.kubernetes.io/name: curso-contenedores-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curso-contenedores-postgres
  template:
    metadata:
      labels:
        app: curso-contenedores-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18
          imagePullPolicy: Always
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: curso-contenedores-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: curso-contenedores-config
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: curso-contenedores-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              # Recursos minimos reservados para que el scheduler ubique el Pod.
              cpu: "100m"
              memory: "128Mi"
            limits:
              # Tope maximo de recursos que el contenedor puede consumir.
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: postgres-storage
              # Ruta donde Postgres guarda sus datos.
              mountPath: /var/lib/postgresql/
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            # Vincula el volumen del Pod con el PVC declarado antes.
            claimName: curso-contenedores-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: curso-contenedores-postgres
  namespace: curso-contenedores
  labels:
    app.kubernetes.io/name: curso-contenedores-postgres
spec:
  type: ClusterIP
  selector: 
    app: curso-contenedores-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: curso-contenedores-postgres-pvc
  namespace: curso-contenedores
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1G